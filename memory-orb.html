<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Memory Orb</title>
<style>
  :root {
    color-scheme: light;
    --ink: #2a1f33;
    --ink-soft: #6b5a7c;
    --ink-faint: #b0a2c0;
    --line: rgba(180, 160, 200, 0.28);
    --accent: #8a6ab0;
    --accent-soft: #d8c8e6;
    --gold: #c89c5c;
    --rose: #c4707b;
    --serif: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    background:
      radial-gradient(ellipse 100% 70% at 50% 0%, #fff0e4 0%, transparent 60%),
      linear-gradient(165deg,
        #ffe6ec 0%,
        #ffeed4 18%,
        #fff8e8 38%,
        #f4e6f4 62%,
        #e0d0ee 85%,
        #d4c8e8 100%);
    position: relative;
    min-height: 100vh;
    transition: background 0.6s ease, color 0.6s ease;
  }
  body.dark {
    color: #f0eaff;
    background:
      radial-gradient(ellipse 100% 70% at 50% 0%, #1a0f2e 0%, transparent 60%),
      linear-gradient(165deg,
        #0a0418 0%,
        #100828 22%,
        #1a0f30 50%,
        #221038 78%,
        #150a25 100%);
  }
  body.dark .atmosphere {
    background:
      radial-gradient(ellipse 70% 50% at 25% 30%, rgba(120, 60, 130, 0.4), transparent 65%),
      radial-gradient(ellipse 60% 50% at 75% 75%, rgba(60, 40, 130, 0.35), transparent 65%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(80, 50, 100, 0.3), transparent 70%);
  }
  body.dark .clouds::before, body.dark .clouds::after, body.dark .clouds > div {
    background: radial-gradient(ellipse, rgba(120, 80, 180, 0.25), transparent 70%);
  }
  body.dark .stars > div {
    background: rgba(255, 255, 255, 0.55);
    box-shadow: 0 0 2px 0.5px rgba(255, 255, 255, 0.25);
  }
  body.dark .actions button {
    background: rgba(40, 25, 60, 0.55);
    border-color: rgba(180, 150, 220, 0.3);
    color: #f0eaff;
  }
  body.dark .actions button:hover {
    background: rgba(60, 40, 90, 0.75);
    border-color: rgba(200, 170, 240, 0.5);
  }
  body.dark .brand { color: #c0aedc; }
  body.dark .brand .count { color: #d8c4f8; }
  body.dark .hint { color: rgba(200, 180, 230, 0.6); }
  body.dark .empty-orb .title { color: #f0eaff; text-shadow: 0 1px 12px rgba(120, 80, 180, 0.6); }
  body.dark .empty-orb .sub { color: #b8a4d0; text-shadow: 0 1px 8px rgba(80, 40, 120, 0.6); }
  body.dark .capture {
    background: rgba(30, 18, 50, 0.65);
    border-color: rgba(180, 150, 220, 0.3);
    box-shadow: 0 20px 50px -20px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(180, 150, 220, 0.15) inset;
  }
  body.dark .capture textarea { color: #f0eaff; }
  body.dark .capture textarea::placeholder { color: rgba(200, 180, 230, 0.5); }
  body.dark .meta-chip {
    background: rgba(50, 30, 80, 0.6);
    border-color: rgba(180, 150, 220, 0.3);
    color: #d8c4f8;
  }
  body.dark .meta-chip:hover { background: rgba(70, 45, 105, 0.8); border-color: #c8a8f0; color: #f0eaff; }
  body.dark .panel, body.dark .patterns {
    background: rgba(30, 18, 50, 0.78);
    border-color: rgba(180, 150, 220, 0.3);
    color: #f0eaff;
  }
  body.dark .panel .when, body.dark .patterns .sub { color: #b8a4d0; }
  body.dark .panel .body, body.dark .patterns h3, body.dark .patterns-content { color: #f0eaff; }
  body.dark .panel .meta-line { color: #d8c4f8; }
  body.dark .panel-actions button { color: #d8c4f8; border-color: rgba(180, 150, 220, 0.3); }
  body.dark .panel-actions button:hover { color: #f0eaff; border-color: #c8a8f0; }
  body.dark .related-item { color: #d8c4f8; border-color: rgba(180, 150, 220, 0.2); }
  body.dark .library {
    background: rgba(30, 18, 50, 0.95);
    border-color: rgba(180, 150, 220, 0.3);
  }
  body.dark .library-head h2, body.dark .entry .text { color: #f0eaff; }
  body.dark .library-head input { color: #f0eaff; border-color: rgba(180, 150, 220, 0.3); }
  body.dark .entry:hover { background: rgba(80, 50, 120, 0.25); }
  body.dark .entry .meta { color: #b8a4d0; }
  body.dark .entry-thumb { background: linear-gradient(135deg, #4a2a6e, #2a1a4a); }

  /* atmospheric layers */
  .atmosphere, .clouds, .stars {
    position: fixed; inset: 0; pointer-events: none;
  }
  .atmosphere {
    background:
      radial-gradient(ellipse 70% 50% at 25% 30%, rgba(255, 180, 210, 0.55), transparent 65%),
      radial-gradient(ellipse 60% 50% at 75% 75%, rgba(200, 180, 250, 0.55), transparent 65%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(255, 220, 170, 0.45), transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 20%, rgba(255, 200, 230, 0.5), transparent 65%);
    animation: atmosphere-shift 90s ease-in-out infinite;
  }
  @keyframes atmosphere-shift {
    0%, 100% { transform: scale(1) translate(0, 0); }
    33% { transform: scale(1.08) translate(2%, -1%); }
    66% { transform: scale(0.96) translate(-1%, 2%); }
  }

  .clouds::before, .clouds::after, .clouds > div {
    content: '';
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.55), transparent 70%);
    filter: blur(50px);
  }
  .clouds::before { width: 50%; height: 30%; top: 8%; left: -8%; animation: cloud1 100s linear infinite; }
  .clouds::after  { width: 60%; height: 35%; top: 65%; right: -15%; animation: cloud2 120s linear infinite; }
  .clouds > .c3   { width: 40%; height: 25%; top: 35%; left: 60%; animation: cloud3 90s ease-in-out infinite; }
  @keyframes cloud1 { 0% { transform: translateX(-30%); } 100% { transform: translateX(60vw); } }
  @keyframes cloud2 { 0% { transform: translateX(30%); } 100% { transform: translateX(-60vw); } }
  @keyframes cloud3 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-10%, 5%); } }

  /* tiny sparkle particles — kept very subtle */
  .stars > div {
    position: absolute;
    width: 1.5px; height: 1.5px; border-radius: 50%;
    background: rgba(255, 255, 255, 0.7);
    box-shadow: 0 0 2px 0.5px rgba(255,255,255,0.3);
    animation: twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.08; transform: scale(0.7); }
    50%      { opacity: 0.32; transform: scale(1.0); }
  }

  /* aura behind the orb */
  .aura {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 80vmin; height: 80vmin;
    border-radius: 50%;
    pointer-events: none;
    filter: blur(50px) hue-rotate(var(--aura-hue, 0deg));
    background: conic-gradient(
      from 0deg,
      rgba(255, 170, 200, 0.85),
      rgba(255, 200, 150, 0.8),
      rgba(255, 240, 180, 0.85),
      rgba(190, 235, 200, 0.8),
      rgba(170, 210, 250, 0.85),
      rgba(210, 180, 240, 0.85),
      rgba(255, 170, 200, 0.85));
    animation: aura-spin 80s linear infinite;
    opacity: 0.95;
    z-index: 1;
    transition: filter 0.4s ease;
  }
  @keyframes aura-spin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
  }

  /* canvas */
  #orb-canvas {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
    cursor: grab;
    touch-action: none;
    z-index: 5;
  }
  #orb-canvas.dragging { cursor: grabbing; }

  /* header */
  header {
    position: fixed; top: 22px; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 26px;
    z-index: 20;
    pointer-events: none;
  }
  header > * { pointer-events: auto; }
  .brand {
    font-family: var(--serif);
    font-size: 13px; letter-spacing: 4px;
    color: var(--ink-soft);
    text-transform: uppercase;
    font-style: italic;
  }
  .brand .count {
    font-style: normal;
    margin-left: 10px;
    color: var(--accent);
    font-weight: 500;
    letter-spacing: 1px;
  }
  .actions { display: flex; gap: 6px; }
  .actions button {
    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255, 255, 255, 0.65);
    color: var(--ink);
    padding: 7px 13px;
    border-radius: 999px;
    font-size: 11px;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--sans);
  }
  .actions button:hover {
    background: rgba(255, 255, 255, 0.8);
    transform: translateY(-1px);
    border-color: var(--accent-soft);
  }

  /* hint */
  .hint {
    position: fixed;
    bottom: 130px; left: 50%;
    transform: translateX(-50%);
    color: var(--ink-faint);
    font-size: 11px; letter-spacing: 1.5px;
    pointer-events: none;
    z-index: 10;
    text-align: center;
    transition: opacity 0.4s;
  }
  .hint.fade { opacity: 0.3; }

  /* empty state */
  .empty-orb {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    z-index: 8;
    color: var(--ink);
    transition: opacity 0.5s;
  }
  .empty-orb.gone { opacity: 0; }
  .empty-orb .title {
    font-family: var(--serif);
    font-size: 22px;
    font-style: italic;
    color: var(--ink);
    margin-bottom: 8px;
    text-shadow: 0 1px 12px rgba(255, 255, 255, 0.7);
  }
  .empty-orb .sub {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--ink-soft);
    text-transform: lowercase;
    text-shadow: 0 1px 8px rgba(255, 255, 255, 0.6);
  }

  /* capture bar */
  .capture {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%);
    width: min(580px, 92vw);
    background: rgba(255, 255, 255, 0.62);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    border: 1px solid rgba(255, 255, 255, 0.7);
    border-radius: 24px;
    padding: 14px 18px 12px;
    box-shadow: 0 20px 50px -20px rgba(80, 60, 100, 0.35), 0 0 0 1px rgba(255, 255, 255, 0.4) inset;
    z-index: 25;
  }
  .capture textarea {
    width: 100%;
    background: transparent;
    border: 0; outline: 0; resize: none;
    font-family: var(--serif);
    font-size: 16px; line-height: 1.5;
    color: var(--ink);
    min-height: 24px;
    overflow: hidden;
  }
  .capture textarea::placeholder { color: var(--ink-faint); font-style: italic; }
  .capture-meta {
    display: flex; gap: 6px; align-items: center; margin-top: 8px;
    flex-wrap: wrap;
  }
  .meta-chip {
    background: rgba(255, 255, 255, 0.65);
    border: 1px solid var(--line);
    padding: 4px 11px; border-radius: 999px;
    font-size: 11px; color: var(--ink-soft);
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 5px;
    transition: all 0.15s;
    font-family: var(--sans);
  }
  .meta-chip:hover { background: rgba(255, 255, 255, 0.9); border-color: var(--accent); color: var(--accent); }
  .meta-chip.active { background: var(--accent); color: white; border-color: var(--accent); }
  .meta-chip svg { width: 11px; height: 11px; flex-shrink: 0; }
  .capture-save {
    margin-left: auto;
    background: var(--accent);
    color: white;
    border: 0;
    padding: 6px 16px;
    border-radius: 999px;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.2s;
  }
  .capture-save:disabled { opacity: 0.35; cursor: default; }
  .capture-save:not(:disabled):hover { transform: translateY(-1px); }
  .capture-extras {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s ease;
  }
  .capture-extras.open { max-height: 280px; }
  .extras-row {
    display: flex; gap: 8px; align-items: center;
    margin-top: 8px;
  }
  .extras-row input[type="text"] {
    flex: 1;
    background: rgba(255,255,255,0.6);
    border: 1px solid var(--line);
    padding: 7px 12px;
    border-radius: 10px;
    font-size: 13px;
    outline: 0;
    color: var(--ink);
    font-family: var(--sans);
  }
  .extras-row input[type="text"]:focus { border-color: var(--accent); background: rgba(255,255,255,0.85); }
  .photo-preview-wrap {
    margin-top: 8px; position: relative;
    display: none;
  }
  .photo-preview-wrap.shown { display: block; }
  .photo-preview {
    max-height: 100px;
    border-radius: 10px;
    border: 1px solid var(--line);
    box-shadow: 0 4px 12px -4px rgba(80, 60, 100, 0.25);
  }
  .photo-clear {
    position: absolute; top: -6px; left: 90px;
    background: rgba(40,30,50,0.85); color: white;
    border: 0; width: 18px; height: 18px;
    border-radius: 50%; cursor: pointer;
    font-size: 12px; line-height: 1;
  }

  /* memory detail panel */
  .panel {
    position: fixed; top: 70px; right: 24px;
    width: min(380px, 90vw); max-height: calc(100vh - 180px);
    background: rgba(255, 252, 250, 0.78);
    backdrop-filter: blur(26px);
    -webkit-backdrop-filter: blur(26px);
    border: 1px solid rgba(255, 255, 255, 0.7);
    border-radius: 22px;
    box-shadow: 0 26px 70px -20px rgba(80, 60, 100, 0.4);
    padding: 24px;
    overflow-y: auto;
    z-index: 30;
    transform: translateX(440px);
    opacity: 0;
    transition: transform 0.45s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s;
  }
  .panel.open { transform: translateX(0); opacity: 1; }
  .panel-close {
    position: absolute; top: 14px; right: 16px;
    background: transparent; border: 0; color: var(--ink-faint);
    font-size: 22px; cursor: pointer; line-height: 1; padding: 2px;
  }
  .panel-close:hover { color: var(--ink); }
  .panel .when {
    font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 12px;
  }
  .panel .photo {
    width: 100%; border-radius: 14px; margin-bottom: 14px;
    box-shadow: 0 12px 28px -10px rgba(80, 60, 100, 0.4);
    display: block;
  }
  .panel .body {
    font-family: var(--serif); font-size: 16px; line-height: 1.6;
    color: var(--ink); white-space: pre-wrap; margin-bottom: 14px;
  }
  .panel .meta-line {
    font-size: 12px; color: var(--ink-soft);
    display: flex; align-items: center; gap: 8px;
    margin: 6px 0;
    font-family: var(--sans);
  }
  .panel .meta-line svg { width: 13px; height: 13px; flex-shrink: 0; color: var(--accent); }
  .panel .meta-line a { color: var(--accent); text-decoration: none; word-break: break-all; }
  .panel .meta-line a:hover { text-decoration: underline; }
  .panel-actions {
    display: flex; gap: 8px; margin-top: 18px;
    padding-top: 14px; border-top: 1px solid var(--line);
    flex-wrap: wrap;
  }
  .panel-actions button {
    background: transparent; border: 1px solid var(--line);
    color: var(--ink-soft); font-size: 11px;
    padding: 5px 12px; border-radius: 999px; cursor: pointer;
    letter-spacing: 0.3px;
    font-family: var(--sans);
  }
  .panel-actions button:hover { border-color: var(--accent); color: var(--accent); }
  .panel-actions button.danger:hover { border-color: var(--rose); color: var(--rose); }
  .related-section {
    margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line);
  }
  .related-label {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 8px;
  }
  .related-item {
    font-family: var(--serif); font-size: 13px; line-height: 1.5;
    color: var(--ink-soft); cursor: pointer;
    padding: 6px 0; border-bottom: 1px solid var(--line);
    transition: color 0.15s;
  }
  .related-item:last-child { border-bottom: 0; }
  .related-item:hover { color: var(--accent); }

  /* patterns panel */
  .patterns {
    position: fixed; top: 70px; left: 24px;
    width: min(420px, 90vw); max-height: calc(100vh - 180px);
    background: rgba(255, 250, 242, 0.85);
    backdrop-filter: blur(26px);
    -webkit-backdrop-filter: blur(26px);
    border: 1px solid rgba(255, 240, 220, 0.8);
    border-radius: 22px;
    box-shadow: 0 26px 70px -20px rgba(150, 110, 70, 0.35);
    padding: 24px;
    overflow-y: auto;
    z-index: 30;
    transform: translateX(-440px);
    opacity: 0;
    transition: transform 0.45s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s;
  }
  .patterns.open { transform: translateX(0); opacity: 1; }
  .patterns h3 {
    font-family: var(--serif); font-weight: 400; font-size: 17px;
    margin: 0 0 4px;
    color: var(--ink);
  }
  .patterns .sub {
    font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 18px;
  }
  .patterns-content {
    font-family: var(--serif); font-size: 14px; line-height: 1.65;
    color: var(--ink); white-space: pre-wrap;
  }
  .patterns-loading {
    display: flex; align-items: center; gap: 10px;
    color: var(--ink-faint); font-size: 13px; font-style: italic;
    font-family: var(--serif);
  }
  .loading-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); animation: pulse-dot 1.4s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50%      { opacity: 1; transform: scale(1.3); }
  }
  .patterns-empty {
    color: var(--ink-faint); font-style: italic; font-family: var(--serif);
    font-size: 14px; line-height: 1.6;
  }

  /* browse overlay */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(40, 30, 50, 0.4);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none;
    align-items: flex-start; justify-content: center;
    padding: 56px 20px;
    z-index: 50;
    overflow-y: auto;
  }
  .overlay.open { display: flex; }
  .library {
    background: rgba(255, 252, 250, 0.95);
    border-radius: 22px;
    width: 100%; max-width: 640px;
    box-shadow: 0 30px 80px -20px rgba(40, 30, 50, 0.4);
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.7);
  }
  .library-head {
    padding: 16px 22px;
    border-bottom: 1px solid var(--line);
    display: flex; gap: 14px; align-items: center;
  }
  .library-head h2 {
    font-family: var(--serif); font-weight: 400; font-size: 17px; margin: 0;
    white-space: nowrap;
  }
  .library-head input {
    flex: 1;
    background: transparent;
    border: 0; outline: 0;
    border-bottom: 1px solid var(--line);
    padding: 4px 0;
    font-size: 13px; color: var(--ink);
    font-family: var(--sans);
  }
  .library-head input:focus { border-color: var(--accent); }
  .library-list { padding: 4px 0; max-height: 60vh; overflow-y: auto; }
  .entry {
    padding: 14px 22px;
    border-bottom: 1px solid var(--line);
    transition: background 0.15s;
    cursor: pointer;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .entry:last-child { border-bottom: 0; }
  .entry:hover { background: rgba(220, 200, 240, 0.15); }
  .entry-thumb {
    width: 44px; height: 44px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent-soft), #ffe4d8);
    flex-shrink: 0;
    object-fit: cover;
  }
  .entry-body { flex: 1; min-width: 0; }
  .entry .meta {
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 4px;
  }
  .entry .text {
    font-family: var(--serif); font-size: 14px; color: var(--ink);
    line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .empty-state {
    padding: 60px 22px; text-align: center;
    color: var(--ink-faint); font-style: italic; font-size: 13px;
    font-family: var(--serif);
  }

  /* toast */
  .toast {
    position: fixed; bottom: 110px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(40,30,50,0.92); color: #f4eee5;
    padding: 8px 16px; border-radius: 999px;
    font-size: 12px; letter-spacing: 0.3px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="atmosphere"></div>
<div class="clouds"><div class="c3"></div></div>
<div class="stars" id="stars"></div>
<div class="aura"></div>

<canvas id="orb-canvas"></canvas>

<header>
  <div class="brand">memory orb<span class="count" id="count">·</span></div>
  <div class="actions">
    <button id="btn-theme" title="toggle dark mode">☾</button>
    <button id="btn-patterns">find patterns</button>
    <button id="btn-browse">browse</button>
    <button id="btn-export">export</button>
    <button id="btn-import">import</button>
    <input type="file" id="file-import" accept="application/json" style="display:none" />
  </div>
</header>

<div class="hint" id="hint">drag or scroll to rotate · pinch to zoom · click a node</div>

<!-- Capture -->
<div class="capture">
  <textarea id="cap-text" placeholder="leave a thought..." rows="1"></textarea>
  <div class="capture-meta">
    <button class="meta-chip" id="chip-photo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="11" r="2"/><path d="m3 17 5-4 4 3 5-5 4 4"/></svg>
      photo
    </button>
    <button class="meta-chip" id="chip-place">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s7-7 7-13a7 7 0 0 0-14 0c0 6 7 13 7 13z"/><circle cx="12" cy="9" r="2.5"/></svg>
      place
    </button>
    <button class="meta-chip" id="chip-song">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      song
    </button>
    <button class="capture-save" id="cap-save" disabled>save</button>
  </div>
  <div class="capture-extras" id="cap-extras">
    <div class="extras-row" id="row-place" style="display:none;">
      <input type="text" id="cap-place" placeholder="where? (e.g. Berkeley rooftop, sunset)" />
    </div>
    <div class="extras-row" id="row-song" style="display:none;">
      <input type="text" id="cap-song" placeholder="paste a Spotify, Apple Music, or YouTube link" />
    </div>
    <div class="extras-row" id="row-photo" style="display:none;">
      <input type="file" id="cap-photo" accept="image/*" />
    </div>
    <div class="photo-preview-wrap" id="photo-wrap">
      <img class="photo-preview" id="photo-preview" alt="" />
      <button class="photo-clear" id="photo-clear" title="remove">&times;</button>
    </div>
  </div>
</div>

<!-- Memory detail -->
<aside class="panel" id="panel">
  <button class="panel-close" id="panel-close">&times;</button>
  <div id="panel-body"></div>
</aside>

<!-- Patterns -->
<aside class="patterns" id="patterns-panel">
  <button class="panel-close" id="patterns-close">&times;</button>
  <h3>patterns in the orb</h3>
  <div class="sub">a synthesis</div>
  <div id="patterns-content"></div>
</aside>

<!-- Browse overlay -->
<div class="overlay" id="overlay">
  <div class="library">
    <div class="library-head">
      <h2>All thoughts</h2>
      <input id="search" type="text" placeholder="search..." />
      <button class="panel-close" id="overlay-close" style="position:static;">&times;</button>
    </div>
    <div class="library-list" id="library-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  "use strict";

  // ============================================================
  // STORAGE
  // ============================================================
  const STORAGE_KEY = "memory-orb.v3.entries";
  const POS_KEY = "memory-orb.v3.positions";
  const SEEN_KEY = "memory-orb.v3.seen";

  function safeParse(raw, fallback) {
    try { return raw ? JSON.parse(raw) : fallback; } catch (e) { return fallback; }
  }
  function load() { return safeParse(localStorage.getItem(STORAGE_KEY), []); }
  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }
  function loadPositions() { return safeParse(localStorage.getItem(POS_KEY), {}); }
  function savePositions() { localStorage.setItem(POS_KEY, JSON.stringify(positions)); }
  function loadSeen() { return safeParse(localStorage.getItem(SEEN_KEY), {}); }
  function saveSeen() { localStorage.setItem(SEEN_KEY, JSON.stringify(seen)); }

  let entries = load();
  let positions = loadPositions();
  let seen = loadSeen();
  let edges = [];
  // Pattern constellations — set after running "find patterns"
  // Each: { name, observation, ids: [entryIds], hue }
  let constellations = [];

  // ============================================================
  // 3D MATH
  // ============================================================
  function hashStr(s) {
    let h = 5381;
    for (let i = 0; i < s.length; i++) h = ((h << 5) + h + s.charCodeAt(i)) | 0;
    return Math.abs(h);
  }
  function fract(x) { return x - Math.floor(x); }
  function rand01(seed, k) {
    return fract(Math.sin(seed * 12.9898 + k * 78.233) * 43758.5453);
  }

  function positionFor(id) {
    if (positions[id]) return positions[id];
    const h = hashStr(id);
    const u = rand01(h, 1);
    const v = rand01(h, 2);
    // Uniform on sphere
    const phi = u * Math.PI * 2;
    const cosTheta = 2 * v - 1;
    const sinTheta = Math.sqrt(1 - cosTheta * cosTheta);
    const r = 1.0 + rand01(h, 3) * 0.15;
    const p = {
      x: r * sinTheta * Math.cos(phi),
      y: r * cosTheta,
      z: r * sinTheta * Math.sin(phi)
    };
    positions[id] = p;
    savePositions();
    return p;
  }

  // Camera
  const cam = { yaw: 0.3, pitch: -0.2, distance: 3.6 };
  let momentum = { yaw: 0.0008, pitch: 0 };
  let camAnim = null;

  function spinToFace(p, duration) {
    duration = duration || 800;
    // Rotate the orb so this 3D point faces the camera (smallest z = closest)
    const targetYaw = Math.atan2(-p.x, -p.z);
    const targetPitch = Math.atan2(-p.y, Math.hypot(p.x, p.z));
    const TAU = Math.PI * 2;
    let dYaw = targetYaw - cam.yaw;
    dYaw = ((dYaw + Math.PI) % TAU + TAU) % TAU - Math.PI;
    let dPitch = targetPitch - cam.pitch;
    dPitch = ((dPitch + Math.PI) % TAU + TAU) % TAU - Math.PI;
    camAnim = {
      startYaw: cam.yaw,
      startPitch: cam.pitch,
      dYaw, dPitch,
      startTime: performance.now(),
      duration
    };
  }

  function project(p, vw, vh) {
    const cy = Math.cos(cam.yaw), sy = Math.sin(cam.yaw);
    const cp = Math.cos(cam.pitch), sp = Math.sin(cam.pitch);
    let x1 = p.x * cy - p.z * sy;
    let z1 = p.x * sy + p.z * cy;
    let y2 = p.y * cp - z1 * sp;
    let z2 = p.y * sp + z1 * cp;
    const f = Math.min(vw, vh) * 0.42;
    const d = cam.distance;
    const scale = f / (z2 + d);
    return {
      x: vw / 2 + x1 * scale,
      y: vh / 2 + y2 * scale,
      z: z2,
      scale: scale
    };
  }

  // ============================================================
  // CONTEXT WEB (similarity-based edges)
  // ============================================================
  const STOP = new Set(("the a an and or but is are was were be been being i you he she it we they me him her us them my your his hers its our their this that these those not no nor do does did doing have has had having will would should could can may might must just like so as if by from of in on at to for with up out about into through over under again more most other some such own same than too very also then when where why how what who whom which all any both each few only own here there now").split(" "));
  function tokenize(t) {
    return (t.toLowerCase().match(/\b[a-z][a-z']{2,}\b/g) || []).filter(w => !STOP.has(w));
  }
  function sim(a, b) {
    const sa = new Set(tokenize(a));
    const sb = new Set(tokenize(b));
    if (!sa.size || !sb.size) return 0;
    let inter = 0;
    for (const w of sa) if (sb.has(w)) inter++;
    return inter / (sa.size + sb.size - inter);
  }
  function computeEdges() {
    const set = new Set();
    const out = [];
    for (let i = 0; i < entries.length; i++) {
      const sims = [];
      for (let j = 0; j < entries.length; j++) {
        if (i === j) continue;
        const s = sim(entries[i].text, entries[j].text);
        if (s > 0.06) sims.push({ j, s });
      }
      sims.sort((a, b) => b.s - a.s);
      for (const { j, s } of sims.slice(0, 3)) {
        const k = [entries[i].id, entries[j].id].sort().join("|");
        if (!set.has(k)) {
          set.add(k);
          out.push({ a: entries[i].id, b: entries[j].id, s });
        }
      }
    }
    edges = out;
  }
  function relatedTo(id, n) {
    return edges
      .filter(e => e.a === id || e.b === id)
      .map(e => e.a === id ? e.b : e.a)
      .map(rid => entries.find(en => en.id === rid))
      .filter(Boolean)
      .slice(0, n);
  }

  // ============================================================
  // CANVAS
  // ============================================================
  const canvas = document.getElementById("orb-canvas");
  const ctx = canvas.getContext("2d");
  let DPR = Math.min(window.devicePixelRatio || 1, 2);
  let vw = window.innerWidth, vh = window.innerHeight;

  function resize() {
    vw = window.innerWidth; vh = window.innerHeight;
    canvas.width = vw * DPR; canvas.height = vh * DPR;
    canvas.style.width = vw + "px"; canvas.style.height = vh + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resize();
  window.addEventListener("resize", resize);

  let activeId = null;
  let hoverId = null;
  let projectedCache = [];

  // 4-pointed sparkle — soft stretched glows, no hard edges anywhere
  function drawSparkle(x, y, size, hue, opacity, full) {
    const rayLen = size * (full ? 2.6 : 1.8);
    const rayWidth = size * 0.55;
    ctx.save();
    ctx.translate(x, y);

    // Vertical ray — stretched radial gradient (fades softly in all directions)
    ctx.save();
    ctx.scale(1, rayLen / rayWidth);
    const vg = ctx.createRadialGradient(0, 0, 0, 0, 0, rayWidth);
    vg.addColorStop(0,   `rgba(255, 255, 255, ${opacity * 0.85})`);
    vg.addColorStop(0.4, `hsla(${hue}, 90%, 92%, ${opacity * 0.35})`);
    vg.addColorStop(1,   `hsla(${hue}, 90%, 88%, 0)`);
    ctx.fillStyle = vg;
    ctx.beginPath(); ctx.arc(0, 0, rayWidth, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    // Horizontal ray
    ctx.save();
    ctx.scale(rayLen / rayWidth, 1);
    const hg = ctx.createRadialGradient(0, 0, 0, 0, 0, rayWidth);
    hg.addColorStop(0,   `rgba(255, 255, 255, ${opacity * 0.85})`);
    hg.addColorStop(0.4, `hsla(${hue}, 90%, 92%, ${opacity * 0.35})`);
    hg.addColorStop(1,   `hsla(${hue}, 90%, 88%, 0)`);
    ctx.fillStyle = hg;
    ctx.beginPath(); ctx.arc(0, 0, rayWidth, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    // Soft colored aura under everything
    if (full) {
      const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 2.4);
      glow.addColorStop(0, `hsla(${hue}, 90%, 92%, ${opacity * 0.5})`);
      glow.addColorStop(1, `hsla(${hue}, 90%, 88%, 0)`);
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(0, 0, size * 2.4, 0, Math.PI * 2); ctx.fill();
    }

    // Soft white core — radial gradient, no hard edge
    const core = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 1.2);
    core.addColorStop(0,   `rgba(255, 255, 255, ${opacity})`);
    core.addColorStop(0.4, `rgba(255, 255, 255, ${opacity * 0.65})`);
    core.addColorStop(0.7, `rgba(255, 255, 255, ${opacity * 0.25})`);
    core.addColorStop(1,   `rgba(255, 255, 255, 0)`);
    ctx.fillStyle = core;
    ctx.beginPath(); ctx.arc(0, 0, size * 1.2, 0, Math.PI * 2); ctx.fill();

    ctx.restore();
  }

  // Color attractors — a few colored "clouds" that bleed into each other organically.
  // Hue at any 3D point is a distance-weighted circular mean of these attractors.
  const ATTRACTORS = [
    { x:  0.55, y:  0.25, z:  0.35, hue: 348, w: 1.3 },  // rose
    { x: -0.30, y: -0.55, z:  0.55, hue:  28, w: 1.0 },  // peach
    { x:  0.10, y: -0.10, z: -0.75, hue: 192, w: 1.1 },  // cyan
    { x: -0.60, y:  0.30, z: -0.25, hue: 282, w: 0.9 },  // lavender
    { x:  0.35, y: -0.50, z: -0.30, hue:  48, w: 0.8 },  // gold
    { x: -0.10, y:  0.65, z:  0.20, hue: 318, w: 0.9 }   // pink
  ];

  // Hue from a 3D point — circular mean of attractors weighted by 1/d^4 for blob falloff
  function hueAt(p) {
    let sx = 0, sy = 0;
    for (const a of ATTRACTORS) {
      const dx = p.x - a.x, dy = p.y - a.y, dz = p.z - a.z;
      const d2 = dx*dx + dy*dy + dz*dz + 0.05;
      const w = a.w / (d2 * d2);
      const r = a.hue * Math.PI / 180;
      sx += w * Math.cos(r);
      sy += w * Math.sin(r);
    }
    let h = Math.atan2(sy, sx) * 180 / Math.PI;
    return ((h % 360) + 360) % 360;
  }

  // Saturation/lightness near attractors is higher; in-between is softer
  function colorAt(p) {
    let sx = 0, sy = 0, peakW = 0;
    for (const a of ATTRACTORS) {
      const dx = p.x - a.x, dy = p.y - a.y, dz = p.z - a.z;
      const d2 = dx*dx + dy*dy + dz*dz + 0.05;
      const w = a.w / (d2 * d2);
      peakW = Math.max(peakW, w);
      const r = a.hue * Math.PI / 180;
      sx += w * Math.cos(r);
      sy += w * Math.sin(r);
    }
    const total = Math.hypot(sx, sy);
    const concentration = total === 0 ? 0 : Math.min(1, peakW / total);
    let h = Math.atan2(sy, sx) * 180 / Math.PI;
    return {
      hue: ((h % 360) + 360) % 360,
      sat: 55 + concentration * 25,           // 55..80
      light: 80 + (1 - concentration) * 8     // 80..88
    };
  }

  // Ambient stardust inside the orb volume — exists whether or not memories do
  const stardust = [];
  (function makeStardust() {
    const N = 170;
    let i = 0;
    while (stardust.length < N && i < 2000) {
      const x = Math.random() * 2 - 1;
      const y = Math.random() * 2 - 1;
      const z = Math.random() * 2 - 1;
      i++;
      const r2 = x*x + y*y + z*z;
      if (r2 > 1 || r2 < 0.04) continue;
      const c = colorAt({ x, y, z });
      stardust.push({
        x, y, z,
        b: 0.3 + Math.random() * 0.7,
        ph: Math.random() * Math.PI * 2,
        hue: c.hue, sat: c.sat, light: c.light
      });
    }
  })();

  // Stardust constellation threads — precomputed nearest-neighbor pairs
  const stardustEdges = [];
  (function makeStardustEdges() {
    for (let i = 0; i < stardust.length; i++) {
      const a = stardust[i];
      let n1 = -1, n2 = -1, d1 = Infinity, d2 = Infinity;
      for (let j = 0; j < stardust.length; j++) {
        if (j === i) continue;
        const b = stardust[j];
        const dx = a.x - b.x, dy = a.y - b.y, dz = a.z - b.z;
        const d = dx*dx + dy*dy + dz*dz;
        if (d < d1) { d2 = d1; n2 = n1; d1 = d; n1 = j; }
        else if (d < d2) { d2 = d; n2 = j; }
      }
      if (n1 > i) stardustEdges.push([i, n1]);
      if (n2 > i) stardustEdges.push([i, n2]);
    }
  })();

  function render() {
    ctx.clearRect(0, 0, vw, vh);

    if (camAnim) {
      const elapsed = performance.now() - camAnim.startTime;
      const t = Math.min(1, elapsed / camAnim.duration);
      // ease out cubic
      const e = 1 - Math.pow(1 - t, 3);
      cam.yaw = camAnim.startYaw + camAnim.dYaw * e;
      cam.pitch = camAnim.startPitch + camAnim.dPitch * e;
      momentum.yaw = 0;
      momentum.pitch = 0;
      if (t >= 1) camAnim = null;
    } else if (!dragging) {
      cam.yaw += momentum.yaw;
      cam.pitch += momentum.pitch;
      momentum.yaw *= 0.96;
      momentum.pitch *= 0.96;
      // bias toward gentle auto-rotate
      momentum.yaw += (0.0008 - momentum.yaw) * 0.02;
    }
    // Wrap angles so scroll can rotate forever in any direction
    const TAU = Math.PI * 2;
    cam.yaw = ((cam.yaw % TAU) + TAU) % TAU;
    cam.pitch = ((cam.pitch + Math.PI) % TAU + TAU) % TAU - Math.PI;

    // Project all entry nodes
    const projected = entries.map(e => {
      const p = positionFor(e.id);
      return { entry: e, pr: project(p, vw, vh) };
    });
    projectedCache = projected;

    // sphere center
    const cx = vw / 2, cy = vh / 2;
    const sphereR = Math.min(vw, vh) * 0.38;

    // Very subtle ambient drift — barely-there, not the main color source.
    const drift = Math.sin(cam.yaw * 0.5) * 8 + Math.sin(cam.pitch * 0.5) * 4;
    document.documentElement.style.setProperty("--aura-hue", drift.toFixed(1) + "deg");

    // === CONCENTRIC STRUCTURE matching the reference photo ===

    // 1. Outer pink halo — thinner band, soft fade out
    const haloAlpha = isDark ? 0.32 : 0.46;
    const wideHalo = ctx.createRadialGradient(cx, cy, sphereR * 0.7, cx, cy, sphereR * 1.6);
    wideHalo.addColorStop(0,    "rgba(255, 220, 230, 0)");
    wideHalo.addColorStop(0.40, `hsla(${344 + drift}, 75%, 78%, ${haloAlpha * 0.4})`);
    wideHalo.addColorStop(0.55, `hsla(${344 + drift}, 80%, 76%, ${haloAlpha * 0.85})`);
    wideHalo.addColorStop(0.65, `hsla(${344 + drift}, 80%, 76%, ${haloAlpha})`);
    wideHalo.addColorStop(0.80, `hsla(${334 + drift}, 75%, 78%, ${haloAlpha * 0.4})`);
    wideHalo.addColorStop(1,    `hsla(${330 + drift}, 70%, 80%, 0)`);
    ctx.fillStyle = wideHalo;
    ctx.beginPath(); ctx.arc(cx, cy, sphereR * 1.6, 0, Math.PI * 2); ctx.fill();

    // 2. Inner cyan/blue ring — the pale aquamarine band around the bright core
    const cyanRing = ctx.createRadialGradient(cx, cy, sphereR * 0.08, cx, cy, sphereR * 0.7);
    cyanRing.addColorStop(0,   "hsla(195, 60%, 95%, 0.05)");
    cyanRing.addColorStop(0.5, "hsla(195, 70%, 90%, 0.30)");
    cyanRing.addColorStop(0.85,"hsla(200, 60%, 88%, 0.10)");
    cyanRing.addColorStop(1,   "hsla(200, 60%, 88%, 0)");
    ctx.fillStyle = cyanRing;
    ctx.beginPath(); ctx.arc(cx, cy, sphereR * 0.7, 0, Math.PI * 2); ctx.fill();

    // 3. Luminous center — bright in light mode, soft in dark mode
    const c0 = isDark ? 0.32 : 0.85;
    const c1 = isDark ? 0.16 : 0.45;
    const c2 = isDark ? 0.05 : 0.12;
    const brightCore = ctx.createRadialGradient(cx, cy, 0, cx, cy, sphereR * 0.4);
    brightCore.addColorStop(0,   `rgba(255, ${isDark ? 250 : 255}, 245, ${c0})`);
    brightCore.addColorStop(0.3, `rgba(255, ${isDark ? 248 : 252}, 245, ${c1})`);
    brightCore.addColorStop(0.7, `rgba(255, 245, 230, ${c2})`);
    brightCore.addColorStop(1,   "rgba(255, 245, 230, 0)");
    ctx.fillStyle = brightCore;
    ctx.beginPath(); ctx.arc(cx, cy, sphereR * 0.4, 0, Math.PI * 2); ctx.fill();

    // 4. Sphere rim — thin pencil of light at the orb edge
    const rim = ctx.createRadialGradient(cx, cy, sphereR * 0.96, cx, cy, sphereR * 1.02);
    rim.addColorStop(0, "rgba(255, 255, 255, 0)");
    rim.addColorStop(0.5, "rgba(255, 220, 235, 0.30)");
    rim.addColorStop(1, "rgba(255, 200, 220, 0)");
    ctx.fillStyle = rim;
    ctx.beginPath(); ctx.arc(cx, cy, sphereR * 1.02, 0, Math.PI * 2); ctx.fill();

    // 5. Specular highlight — bright off-center spot makes the orb feel like a 3D sphere
    const highlight = ctx.createRadialGradient(
      cx - sphereR * 0.4, cy - sphereR * 0.45, 0,
      cx - sphereR * 0.4, cy - sphereR * 0.45, sphereR * 0.55
    );
    highlight.addColorStop(0,   "rgba(255, 255, 255, 0.55)");
    highlight.addColorStop(0.4, "rgba(255, 250, 240, 0.18)");
    highlight.addColorStop(1,   "rgba(255, 240, 220, 0)");
    ctx.save();
    // clip highlight to inside the sphere
    ctx.beginPath(); ctx.arc(cx, cy, sphereR, 0, Math.PI * 2); ctx.clip();
    ctx.fillStyle = highlight;
    ctx.fillRect(cx - sphereR, cy - sphereR, sphereR * 2, sphereR * 2);
    ctx.restore();

    // 6. Subtle shadow on opposite rim — completes the sphere illusion (light mode only)
    if (!isDark) {
      const innerShadow = ctx.createRadialGradient(
        cx + sphereR * 0.5, cy + sphereR * 0.5, sphereR * 0.3,
        cx + sphereR * 0.5, cy + sphereR * 0.5, sphereR * 1.0
      );
      innerShadow.addColorStop(0, "rgba(180, 120, 150, 0)");
      innerShadow.addColorStop(0.65, "rgba(180, 120, 150, 0)");
      innerShadow.addColorStop(1, "rgba(180, 120, 150, 0.18)");
      ctx.save();
      ctx.beginPath(); ctx.arc(cx, cy, sphereR, 0, Math.PI * 2); ctx.clip();
      ctx.fillStyle = innerShadow;
      ctx.fillRect(cx - sphereR, cy - sphereR, sphereR * 2, sphereR * 2);
      ctx.restore();
    }

    // Watercolor blobs — soft color clouds at each attractor's projected position.
    // Clipped to inside the sphere so they don't leak past the rim.
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, sphereR * 0.98, 0, Math.PI * 2);
    ctx.clip();
    for (const a of ATTRACTORS) {
      const pr = project(a, vw, vh);
      const depthN = Math.max(0, Math.min(1, (1.5 - pr.z) / 3));
      const blobR = sphereR * (0.45 + 0.25 * pr.scale / (Math.min(vw, vh) * 0.42 / cam.distance));
      const op = (0.18 + depthN * 0.32) * a.w;
      const grad = ctx.createRadialGradient(pr.x, pr.y, 0, pr.x, pr.y, blobR);
      grad.addColorStop(0,    `hsla(${a.hue}, 75%, 82%, ${op})`);
      grad.addColorStop(0.5,  `hsla(${a.hue}, 65%, 86%, ${op * 0.45})`);
      grad.addColorStop(1,    `hsla(${a.hue}, 65%, 86%, 0)`);
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(pr.x, pr.y, blobR, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();

    // Stardust constellation threads — faint web of the underlying network
    for (const [ai, bi] of stardustEdges) {
      const a = stardust[ai], b = stardust[bi];
      const ap = project(a, vw, vh), bp = project(b, vw, vh);
      const avgZ = (ap.z + bp.z) / 2;
      const depthN = Math.max(0, Math.min(1, (1.5 - avgZ) / 3));
      const avgHue = (a.hue + b.hue) / 2;
      const op = 0.08 + depthN * 0.22;
      ctx.strokeStyle = `hsla(${avgHue}, 55%, 70%, ${op})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(ap.x, ap.y);
      ctx.lineTo(bp.x, bp.y);
      ctx.stroke();
    }

    // Stardust — twinkling sparkles, each with its own stable hue
    const t = performance.now() * 0.001;
    const dustProjected = stardust.map(d => ({ d, pr: project(d, vw, vh) }))
      .sort((a, b) => b.pr.z - a.pr.z);
    for (const { d, pr } of dustProjected) {
      const depthN = Math.max(0, Math.min(1, (1.5 - pr.z) / 3));
      const tw = 0.4 + 0.6 * Math.sin(t * 1.8 + d.ph);
      const op = (0.55 + depthN * 0.45) * d.b * (0.5 + 0.5 * tw);
      const sz = Math.max(0.8, 1.6 * (pr.scale / (Math.min(vw, vh) * 0.42 / cam.distance)));
      drawSparkle(pr.x, pr.y, sz, d.hue, op, false);
    }

    // Draw edges (back to front by avg z)
    const projMap = new Map(projected.map(p => [p.entry.id, p.pr]));
    const edgeList = edges.map(e => {
      const a = projMap.get(e.a), b = projMap.get(e.b);
      if (!a || !b) return null;
      return { a, b, s: e.s, avgZ: (a.z + b.z) / 2 };
    }).filter(Boolean).sort((p, q) => q.avgZ - p.avgZ);

    for (const ed of edgeList) {
      const op = Math.max(0.22, Math.min(0.65, 0.55 - ed.avgZ * 0.08));
      // Use endpoint hues so the edge belongs to its region
      const aEntry = entries.find(e => projMap.get(e.id) === ed.a);
      const bEntry = entries.find(e => projMap.get(e.id) === ed.b);
      const ah = aEntry ? hueAt(positionFor(aEntry.id)) : 320;
      const bh = bEntry ? hueAt(positionFor(bEntry.id)) : 320;
      const grad = ctx.createLinearGradient(ed.a.x, ed.a.y, ed.b.x, ed.b.y);
      grad.addColorStop(0,   `hsla(${ah}, 55%, 60%, ${op})`);
      grad.addColorStop(0.5, `hsla(${(ah + bh) / 2}, 60%, 75%, ${op * 1.3})`);
      grad.addColorStop(1,   `hsla(${bh}, 55%, 60%, ${op})`);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.0 + ed.s * 1.8;
      ctx.beginPath();
      ctx.moveTo(ed.a.x, ed.a.y);
      ctx.lineTo(ed.b.x, ed.b.y);
      ctx.stroke();
    }

    // Constellation lines — pattern threads identified by Claude
    if (constellations.length) {
      for (const c of constellations) {
        const pts = c.ids.map(id => projMap.get(id)).filter(Boolean);
        if (pts.length < 2) continue;
        const avgZ = pts.reduce((s, p) => s + p.z, 0) / pts.length;
        const op = Math.max(0.45, Math.min(0.85, 0.75 - avgZ * 0.08));
        // Connect each star to the next forming a chain, plus close the loop
        ctx.shadowBlur = 8;
        ctx.shadowColor = `hsla(${c.hue}, 80%, 75%, ${op * 0.8})`;
        ctx.strokeStyle = `hsla(${c.hue}, 75%, 70%, ${op})`;
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
        ctx.lineTo(pts[0].x, pts[0].y); // close the constellation loop
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
    }

    // Sort nodes back to front
    const sorted = projected.slice().sort((a, b) => b.pr.z - a.pr.z);

    for (const { entry, pr } of sorted) {
      const baseSize = 4.5;
      const size = Math.max(2.2, baseSize * (pr.scale / (Math.min(vw, vh) * 0.42 / cam.distance)));
      const depthN = Math.max(0, Math.min(1, (1.5 - pr.z) / 3));
      const opacity = 0.55 + depthN * 0.45;
      const isActive = entry.id === activeId;
      const isHover = entry.id === hoverId;

      // Stable hue from this memory's 3D position
      const orig = positionFor(entry.id);
      const nodeHue = hueAt(orig);

      // 4-pointed sparkle — bigger when active or hovered
      const sparkleSize = size * (isActive ? 1.4 : isHover ? 1.15 : 1.0);
      drawSparkle(pr.x, pr.y, sparkleSize, nodeHue, opacity, true);

      // Photo-bearing nodes get a subtle gold halo ring (soft gradient)
      if (entry.photo) {
        const photoR = size + 3;
        const photoGrad = ctx.createRadialGradient(pr.x, pr.y, photoR - 3, pr.x, pr.y, photoR + 3);
        photoGrad.addColorStop(0, `hsla(48, 90%, 80%, 0)`);
        photoGrad.addColorStop(0.5, `hsla(48, 90%, 80%, ${opacity * 0.7})`);
        photoGrad.addColorStop(1, `hsla(48, 90%, 80%, 0)`);
        ctx.fillStyle = photoGrad;
        ctx.beginPath(); ctx.arc(pr.x, pr.y, photoR + 3, 0, Math.PI * 2); ctx.fill();
      }

      // Active ring — soft glowing halo, no hard edge
      if (isActive) {
        const ringR = size + 12;
        const ringGrad = ctx.createRadialGradient(pr.x, pr.y, ringR - 9, pr.x, pr.y, ringR + 8);
        ringGrad.addColorStop(0,    `hsla(${nodeHue}, 90%, 85%, 0)`);
        ringGrad.addColorStop(0.45, `hsla(${nodeHue}, 90%, 88%, ${opacity * 0.55})`);
        ringGrad.addColorStop(0.6,  `hsla(${nodeHue}, 90%, 85%, ${opacity * 0.35})`);
        ringGrad.addColorStop(1,    `hsla(${nodeHue}, 90%, 85%, 0)`);
        ctx.fillStyle = ringGrad;
        ctx.beginPath(); ctx.arc(pr.x, pr.y, ringR + 8, 0, Math.PI * 2); ctx.fill();
      }
    }

    // === Always-visible anchor sparkles at attractor positions ===
    const anchorBeads = ATTRACTORS.map(a => ({ a, pr: project(a, vw, vh) }))
      .sort((x, y) => y.pr.z - x.pr.z);
    for (const { a, pr } of anchorBeads) {
      const depthN = Math.max(0, Math.min(1, (1.5 - pr.z) / 3));
      const opacity = 0.45 + depthN * 0.45;
      const size = Math.max(1.4, 2.8 * (pr.scale / (Math.min(vw, vh) * 0.42 / cam.distance)));
      drawSparkle(pr.x, pr.y, size, a.hue, opacity, true);
    }

    requestAnimationFrame(render);
  }

  // ============================================================
  // INTERACTION
  // ============================================================
  let dragging = false;
  let dragStart = null;
  let lastPt = null;

  function getPt(e) {
    if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }

  canvas.addEventListener("pointerdown", (e) => {
    dragging = true;
    canvas.classList.add("dragging");
    const p = getPt(e);
    lastPt = p;
    dragStart = { x: p.x, y: p.y, t: Date.now() };
    canvas.setPointerCapture(e.pointerId);
    camAnim = null;
  });
  canvas.addEventListener("pointermove", (e) => {
    const p = getPt(e);
    if (dragging) {
      const dx = p.x - lastPt.x;
      const dy = p.y - lastPt.y;
      cam.yaw += dx * 0.005;
      cam.pitch -= dy * 0.005;
      momentum.yaw = dx * 0.005;
      momentum.pitch = -dy * 0.005;
      lastPt = p;
    } else {
      // Hover detection
      const id = pickAt(p.x, p.y);
      if (id !== hoverId) {
        hoverId = id;
        canvas.style.cursor = id ? "pointer" : "grab";
      }
    }
  });
  canvas.addEventListener("pointerup", (e) => {
    canvas.classList.remove("dragging");
    const p = getPt(e);
    const wasDrag = dragStart && (Math.hypot(p.x - dragStart.x, p.y - dragStart.y) > 5);
    if (!wasDrag) {
      const id = pickAt(p.x, p.y);
      if (id) openMemory(id);
    }
    dragging = false;
    dragStart = null;
  });
  canvas.addEventListener("pointercancel", () => { dragging = false; canvas.classList.remove("dragging"); });

  canvas.addEventListener("wheel", (e) => {
    e.preventDefault();
    if (e.ctrlKey) {
      // Pinch-to-zoom — bounded so the outermost stars never project past the orb rim.
      // (Math: with sphere radius ~1.15, max projected radius = r / sqrt(d^2 - r^2).
      // For that to stay inside sphereR (= 0.905f), we need d >= ~1.8.)
      cam.distance = Math.max(1.85, Math.min(10, cam.distance + e.deltaY * 0.012));
    } else {
      // Scroll rotates the sky — no clamp, infinite rotation
      cam.yaw   -= e.deltaX * 0.004;
      cam.pitch -= e.deltaY * 0.004;
      momentum.yaw = -e.deltaX * 0.004;
      momentum.pitch = -e.deltaY * 0.004;
    }
  }, { passive: false });

  function pickAt(x, y) {
    let best = null, bestD = 22;
    for (const { entry, pr } of projectedCache) {
      const d = Math.hypot(pr.x - x, pr.y - y);
      if (d < bestD) { best = entry.id; bestD = d; }
    }
    return best;
  }

  // ============================================================
  // CRUD
  // ============================================================
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

  function timeAgo(ts) {
    const d = (Date.now() - ts) / 1000;
    if (d < 60) return "just now";
    if (d < 3600) return Math.floor(d / 60) + "m ago";
    if (d < 86400) return Math.floor(d / 3600) + "h ago";
    if (d < 86400 * 7) return Math.floor(d / 86400) + "d ago";
    if (d < 86400 * 30) return Math.floor(d / (86400 * 7)) + "w ago";
    if (d < 86400 * 365) return Math.floor(d / (86400 * 30)) + "mo ago";
    return Math.floor(d / (86400 * 365)) + "y ago";
  }
  function formatDate(ts) {
    return new Date(ts).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
  }
  function escapeHTML(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, c =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }
  function escapeURL(u) {
    if (typeof u !== "string") return "";
    if (!/^https?:\/\//i.test(u)) return "";
    return u.replace(/[<>"]/g, "");
  }

  function updateCount() {
    const n = entries.length;
    document.getElementById("count").textContent = n === 0 ? "·" : "· " + n;
    const eo = document.getElementById("empty-orb");
    if (eo) eo.classList.toggle("gone", n > 0);
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove("show"), 1800);
  }

  // ============================================================
  // CAPTURE
  // ============================================================
  const capText = document.getElementById("cap-text");
  const capSave = document.getElementById("cap-save");
  const capExtras = document.getElementById("cap-extras");
  const capPlace = document.getElementById("cap-place");
  const capSong = document.getElementById("cap-song");
  const capPhoto = document.getElementById("cap-photo");
  const photoPreview = document.getElementById("photo-preview");
  const photoWrap = document.getElementById("photo-wrap");
  const photoClear = document.getElementById("photo-clear");

  let pendingPhoto = null;

  function autoresize() {
    capText.style.height = "auto";
    capText.style.height = Math.max(24, capText.scrollHeight) + "px";
  }
  capText.addEventListener("input", () => {
    capSave.disabled = !capText.value.trim();
    autoresize();
  });
  capText.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      doSave();
    }
  });

  function toggleChip(chip, rowId) {
    chip.classList.toggle("active");
    const row = document.getElementById(rowId);
    const open = chip.classList.contains("active");
    row.style.display = open ? "flex" : "none";
    refreshExtrasOpen();
    if (open) setTimeout(() => row.querySelector("input")?.focus(), 50);
  }
  function refreshExtrasOpen() {
    const anyOpen = document.querySelectorAll(".meta-chip.active").length > 0 || photoWrap.classList.contains("shown");
    capExtras.classList.toggle("open", anyOpen);
  }
  document.getElementById("chip-photo").addEventListener("click", () => {
    if (pendingPhoto) {
      // toggling off clears the photo
      pendingPhoto = null;
      photoWrap.classList.remove("shown");
      document.getElementById("chip-photo").classList.remove("active");
      refreshExtrasOpen();
    } else {
      capPhoto.click();
    }
  });
  document.getElementById("chip-place").addEventListener("click", function () { toggleChip(this, "row-place"); });
  document.getElementById("chip-song").addEventListener("click",  function () { toggleChip(this, "row-song"); });

  capPhoto.addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const dataUrl = await compressImage(file, 720, 0.72);
      pendingPhoto = dataUrl;
      photoPreview.src = dataUrl;
      photoWrap.classList.add("shown");
      document.getElementById("chip-photo").classList.add("active");
      refreshExtrasOpen();
    } catch (err) {
      showToast("couldn't read that image");
    }
    capPhoto.value = "";
  });
  photoClear.addEventListener("click", () => {
    pendingPhoto = null;
    photoWrap.classList.remove("shown");
    document.getElementById("chip-photo").classList.remove("active");
    refreshExtrasOpen();
  });

  async function compressImage(file, maxDim, quality) {
    const dataUrl = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
    const img = await new Promise((res, rej) => {
      const i = new Image();
      i.onload = () => res(i);
      i.onerror = rej;
      i.src = dataUrl;
    });
    let w = img.width, h = img.height;
    if (Math.max(w, h) > maxDim) {
      if (w >= h) { h = Math.round(h * maxDim / w); w = maxDim; }
      else        { w = Math.round(w * maxDim / h); h = maxDim; }
    }
    const c = document.createElement("canvas");
    c.width = w; c.height = h;
    c.getContext("2d").drawImage(img, 0, 0, w, h);
    return c.toDataURL("image/jpeg", quality);
  }

  capSave.addEventListener("click", doSave);
  function doSave() {
    const text = capText.value.trim();
    if (!text) return;
    const entry = {
      id: uid(),
      text,
      ts: Date.now(),
      photo: pendingPhoto || null,
      place: capPlace.value.trim() || null,
      song: capSong.value.trim() || null
    };
    try {
      entries.unshift(entry);
      save();
    } catch (err) {
      // localStorage quota
      entries.shift();
      showToast("storage full. try a smaller photo or export + clear.");
      return;
    }
    positionFor(entry.id);
    computeEdges();
    capText.value = "";
    capPlace.value = "";
    capSong.value = "";
    pendingPhoto = null;
    photoWrap.classList.remove("shown");
    document.querySelectorAll(".meta-chip.active").forEach(c => c.classList.remove("active"));
    document.getElementById("row-place").style.display = "none";
    document.getElementById("row-song").style.display = "none";
    capExtras.classList.remove("open");
    capSave.disabled = true;
    autoresize();
    updateCount();
    showToast("held.");
    // Briefly highlight the new node
    activeId = entry.id;
    setTimeout(() => { if (activeId === entry.id) activeId = null; }, 2400);
  }

  // ============================================================
  // MEMORY DETAIL PANEL
  // ============================================================
  const panel = document.getElementById("panel");
  const panelBody = document.getElementById("panel-body");

  function openMemory(id) {
    const entry = entries.find(e => e.id === id);
    if (!entry) return;
    activeId = id;
    seen[id] = (seen[id] || 0) + 1;
    saveSeen();
    // Spin the orb so this memory comes to front
    spinToFace(positionFor(entry.id), 750);
    renderPanel(entry);
    panel.classList.add("open");
  }
  function closePanel() { panel.classList.remove("open"); activeId = null; }

  function renderPanel(entry) {
    const related = relatedTo(entry.id, 4);
    const songEmbed = entry.song ? songLinkHTML(entry.song) : "";
    const placeHTML = entry.place ? `
      <div class="meta-line">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s7-7 7-13a7 7 0 0 0-14 0c0 6 7 13 7 13z"/><circle cx="12" cy="9" r="2.5"/></svg>
        <span>${escapeHTML(entry.place)}</span>
      </div>` : "";
    const photoHTML = entry.photo ? `<img class="photo" src="${escapeHTML(entry.photo)}" alt="" />` : "";
    const relatedHTML = related.length ? `
      <div class="related-section">
        <div class="related-label">connected memories</div>
        ${related.map(r => `<div class="related-item" data-id="${r.id}">${escapeHTML(r.text.slice(0, 120))}${r.text.length > 120 ? "…" : ""}</div>`).join("")}
      </div>` : "";

    panelBody.innerHTML = `
      <div class="when">${escapeHTML(formatDate(entry.ts))} · ${escapeHTML(timeAgo(entry.ts))}</div>
      ${photoHTML}
      <div class="body">${escapeHTML(entry.text)}</div>
      ${placeHTML}
      ${songEmbed}
      <div class="panel-actions">
        <button data-act="surface">surface</button>
        <button data-act="edit">edit text</button>
        <button data-act="delete" class="danger">release</button>
      </div>
      ${relatedHTML}
    `;
    panelBody.querySelectorAll(".related-item").forEach(el => {
      el.addEventListener("click", () => openMemory(el.dataset.id));
    });
    panelBody.querySelectorAll(".panel-actions button").forEach(btn => {
      btn.addEventListener("click", () => handlePanelAction(btn.dataset.act, entry));
    });
  }

  function songLinkHTML(url) {
    const safe = escapeURL(url);
    if (!safe) return "";
    return `
      <div class="meta-line">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <a href="${safe}" target="_blank" rel="noopener">${escapeHTML(safe)}</a>
      </div>`;
  }

  function handlePanelAction(act, entry) {
    if (act === "delete") {
      if (confirm("Release this memory?")) {
        entries = entries.filter(e => e.id !== entry.id);
        delete positions[entry.id]; savePositions();
        delete seen[entry.id]; saveSeen();
        save();
        computeEdges();
        updateCount();
        closePanel();
        showToast("released.");
      }
    } else if (act === "edit") {
      const t = prompt("edit text", entry.text);
      if (t != null && t.trim()) {
        entry.text = t.trim();
        save();
        computeEdges();
        renderPanel(entry);
        showToast("updated.");
      }
    } else if (act === "surface") {
      // smooth spin to face this memory
      spinToFace(positionFor(entry.id), 750);
      closePanel();
      setTimeout(() => { activeId = entry.id; setTimeout(() => activeId = null, 2200); }, 50);
    }
  }

  document.getElementById("panel-close").addEventListener("click", closePanel);

  // ============================================================
  // PATTERNS (askClaude)
  // ============================================================
  const patternsPanel = document.getElementById("patterns-panel");
  const patternsContent = document.getElementById("patterns-content");

  document.getElementById("btn-patterns").addEventListener("click", openPatterns);
  document.getElementById("patterns-close").addEventListener("click", () => patternsPanel.classList.remove("open"));

  async function openPatterns() {
    patternsPanel.classList.add("open");
    if (entries.length < 3) {
      patternsContent.innerHTML = '<div class="patterns-empty">leave a few more thoughts and the orb will start to see threads connecting them.</div>';
      return;
    }
    patternsContent.innerHTML = '<div class="patterns-loading"><div class="loading-dot"></div>looking across the orb...</div>';
    try {
      const indexed = entries.slice(0, 80).map((e, i) => ({
        i,
        when: new Date(e.ts).toISOString().slice(0, 10),
        text: e.text,
        place: e.place || null
      }));
      const prompt =
"Read these memory-orb entries from one person. Each has an `i` index. " +
"Identify 3 to 5 recurring threads, tensions, or themes that connect different entries. " +
"Return ONLY valid JSON, no other text, in this exact shape:\n" +
'{"patterns":[{"name":"short evocative 2-4 word name","observation":"2-3 sentences of warm observant prose","entry_indices":[0,3,7]}]}\n' +
"Each pattern must list at least 2 entry_indices that weave into it. " +
"Speak gently and reflectively, like a close friend speaking back to the person.";

      let resp;
      if (window.cowork && typeof window.cowork.askClaude === "function") {
        resp = await window.cowork.askClaude(prompt, indexed);
      } else {
        throw new Error("askClaude unavailable");
      }
      const parsed = parsePatternResponse(resp);
      if (!parsed || !parsed.patterns || !parsed.patterns.length) throw new Error("no patterns parsed");

      // Build constellations from the parsed patterns
      const palette = [350, 28, 195, 282, 48, 318];
      constellations = parsed.patterns.map((p, i) => ({
        name: p.name,
        observation: p.observation,
        ids: (p.entry_indices || []).map(idx => entries[idx]?.id).filter(Boolean),
        hue: palette[i % palette.length]
      })).filter(c => c.ids.length >= 2);

      // Render the prose with hue-tinted pattern names
      patternsContent.innerHTML = '<div class="patterns-content">' +
        constellations.map(c =>
          `<div class="pattern-block" style="margin-bottom:18px;">
             <div class="pattern-name" style="color:hsl(${c.hue},65%,50%);font-family:var(--serif);font-size:15px;font-style:italic;margin-bottom:6px;">${escapeHTML(c.name)}</div>
             <div>${escapeHTML(c.observation)}</div>
             <div style="font-size:11px;color:var(--ink-faint);margin-top:6px;letter-spacing:0.5px;">${c.ids.length} stars connected</div>
           </div>`).join("") +
        '<div style="margin-top:14px;font-size:11px;color:var(--ink-faint);letter-spacing:0.5px;border-top:1px solid var(--line);padding-top:10px;">the orb has drawn the constellations onto your sky</div>' +
        '</div>';
    } catch (err) {
      patternsContent.innerHTML =
        '<div class="patterns-empty">the deeper layer is quiet right now. here is a surface read instead:</div>' +
        '<div class="patterns-content" style="margin-top:14px;">' + escapeHTML(localPatterns()) + '</div>';
    }
  }

  function parsePatternResponse(resp) {
    if (!resp) return null;
    if (typeof resp === "object" && resp.patterns) return resp;
    if (typeof resp !== "string") return null;
    // Try direct parse
    try { return JSON.parse(resp); } catch {}
    // Try to extract JSON block
    const m = resp.match(/\{[\s\S]*\}/);
    if (m) {
      try { return JSON.parse(m[0]); } catch {}
    }
    return null;
  }

  function localPatterns() {
    const counts = {};
    for (const e of entries) {
      for (const w of new Set(tokenize(e.text))) {
        counts[w] = (counts[w] || 0) + 1;
      }
    }
    const top = Object.entries(counts)
      .filter(([, n]) => n >= 2)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 6)
      .map(([w]) => w);
    if (!top.length) return "Still gathering. The orb needs more memories to find threads.";
    return "Words you keep returning to: " + top.join(", ") + ".\n\nNotice which ones surprise you. The threads they trace are the ones the orb is holding onto.";
  }

  // ============================================================
  // BROWSE
  // ============================================================
  const overlay = document.getElementById("overlay");
  const libraryList = document.getElementById("library-list");
  const searchInput = document.getElementById("search");

  document.getElementById("btn-browse").addEventListener("click", openBrowse);
  document.getElementById("overlay-close").addEventListener("click", () => overlay.classList.remove("open"));
  overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.classList.remove("open"); });
  searchInput.addEventListener("input", () => renderBrowse(searchInput.value));

  function openBrowse() {
    overlay.classList.add("open");
    searchInput.value = "";
    renderBrowse("");
    setTimeout(() => searchInput.focus(), 40);
  }
  function renderBrowse(filter) {
    const f = (filter || "").trim().toLowerCase();
    const filtered = f
      ? entries.filter(e =>
          e.text.toLowerCase().includes(f) ||
          (e.place && e.place.toLowerCase().includes(f)))
      : entries;
    if (!filtered.length) {
      libraryList.innerHTML = '<div class="empty-state">' +
        (f ? "Nothing matches “" + escapeHTML(f) + "”" : "No memories yet.") +
        '</div>';
      return;
    }
    libraryList.innerHTML = filtered.map(e =>
      '<div class="entry" data-id="' + e.id + '">' +
        (e.photo
          ? '<img class="entry-thumb" src="' + escapeHTML(e.photo) + '" />'
          : '<div class="entry-thumb"></div>') +
        '<div class="entry-body">' +
          '<div class="meta">' + escapeHTML(formatDate(e.ts)) + ' · ' + escapeHTML(timeAgo(e.ts)) +
            (e.place ? ' · ' + escapeHTML(e.place) : '') +
          '</div>' +
          '<div class="text">' + escapeHTML(e.text) + '</div>' +
        '</div>' +
      '</div>'
    ).join("");
    libraryList.querySelectorAll(".entry").forEach(el => {
      el.addEventListener("click", () => {
        overlay.classList.remove("open");
        setTimeout(() => openMemory(el.dataset.id), 150);
      });
    });
  }

  // ============================================================
  // EXPORT / IMPORT
  // ============================================================
  document.getElementById("btn-export").addEventListener("click", () => {
    const blob = new Blob([JSON.stringify({ entries, positions, exportedAt: new Date().toISOString() }, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "memory-orb-" + new Date().toISOString().slice(0, 10) + ".json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast("exported.");
  });
  document.getElementById("btn-import").addEventListener("click", () => document.getElementById("file-import").click());
  document.getElementById("file-import").addEventListener("change", (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const data = JSON.parse(r.result);
        const incoming = Array.isArray(data) ? data : data.entries;
        if (!Array.isArray(incoming)) throw 0;
        const existing = new Set(entries.map(x => x.id));
        let added = 0;
        for (const it of incoming) {
          if (it && it.id && it.text && it.ts && !existing.has(it.id)) {
            entries.push(it); added++;
          }
        }
        entries.sort((a, b) => b.ts - a.ts);
        if (data.positions && typeof data.positions === "object") {
          for (const k in data.positions) {
            if (!positions[k]) positions[k] = data.positions[k];
          }
          savePositions();
        }
        save();
        computeEdges();
        updateCount();
        showToast("imported " + added + ".");
      } catch {
        showToast("couldn't read that file.");
      }
      e.target.value = "";
    };
    r.readAsText(f);
  });

  // ============================================================
  // KEYBOARD
  // ============================================================
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      if (overlay.classList.contains("open")) overlay.classList.remove("open");
      else if (patternsPanel.classList.contains("open")) patternsPanel.classList.remove("open");
      else if (panel.classList.contains("open")) closePanel();
    }
    if (e.key === "/" && document.activeElement !== capText && !overlay.classList.contains("open")) {
      e.preventDefault();
      openBrowse();
    }
  });

  // ============================================================
  // DARK MODE
  // ============================================================
  const THEME_KEY = "memory-orb.theme";
  function applyTheme(isDark) {
    document.body.classList.toggle("dark", isDark);
    document.getElementById("btn-theme").textContent = isDark ? "☀" : "☾";
  }
  let isDark = localStorage.getItem(THEME_KEY) === "dark";
  applyTheme(isDark);
  document.getElementById("btn-theme").addEventListener("click", () => {
    isDark = !isDark;
    applyTheme(isDark);
    localStorage.setItem(THEME_KEY, isDark ? "dark" : "light");
  });

  // ============================================================
  // STARS
  // ============================================================
  function makeStars(n) {
    const root = document.getElementById("stars");
    let html = "";
    for (let i = 0; i < n; i++) {
      const x = Math.random() * 100;
      const y = Math.random() * 100;
      const d = (Math.random() * 4).toFixed(2);
      const s = (0.5 + Math.random() * 1.5).toFixed(2);
      html += `<div style="left:${x}%;top:${y}%;animation-delay:${d}s;transform:scale(${s})"></div>`;
    }
    root.innerHTML = html;
  }
  makeStars(60);

  // ============================================================
  // INIT
  // ============================================================
  computeEdges();
  updateCount();
  autoresize();
  render();

  // Hide hint after first interaction
  let hintHidden = false;
  function hideHint() {
    if (hintHidden) return;
    hintHidden = true;
    document.getElementById("hint").classList.add("fade");
  }
  canvas.addEventListener("pointerdown", hideHint, { once: true });
  capText.addEventListener("focus", hideHint, { once: true });
})();
</script>
</body>
</html>
